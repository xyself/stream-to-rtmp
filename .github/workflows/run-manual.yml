name: Run Application

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - uses: actions/checkout@v4
      
      - name: 删除运行记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          delete_workflow_pattern: "run-manual.yaml"
          keep_minimum_runs: 2
          retain_days: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      # ✅ 加这一段（核心）
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: npm install

      - run: mkdir -p data
      - run: mkdir -p logs

      # ✅ 可选：验证 ffmpeg 是否可用（强烈建议加一次）
      - run: ffmpeg -version

      # 全局安装 PM2
      - run: npm install -g pm2

      # 使用 PM2 启动应用（会自动执行 restore.js）
      - name: Start with PM2
        run: pm2 start ecosystem.config.js
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      # 实时查看日志
      - name: Monitor logs
        run: pm2 logs stream-to-rtmp --lines 100
