services:
  stream-to-rtmp:
    build: .
    container_name: stream-to-rtmp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      FFMPEG_PATH: /usr/bin/ffmpeg
      DATABASE_PATH: /app/data/data.db
      PORT: 8000
    ports:
      - "8000:8000"  # 健康检查端口
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
